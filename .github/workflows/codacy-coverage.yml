name: Codacy Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    env:
      CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-ci.txt

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-ci.txt

      - name: Run backend tests with coverage
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          coverage run --source=backend/app -m pytest backend/tests
          coverage xml -o backend/coverage.xml

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci
          npx playwright install --with-deps chromium

      - name: Run frontend tests with coverage
        run: |
          cd frontend
          npm test -- --watch=false --browsers=ChromeHeadlessNoSandbox --code-coverage || npm test -- --watch=false --code-coverage

      - name: Validate Codacy token
        id: codacy_token
        shell: bash
        run: |
          if [ -z "${CODACY_API_TOKEN}" ]; then
            echo "::warning::Missing CODACY_API_TOKEN secret. Skipping Codacy upload."
            echo "upload_enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "upload_enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload coverage reports to Codacy
        if: ${{ steps.codacy_token.outputs.upload_enabled == 'true' }}
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        with:
          api-token: ${{ secrets.CODACY_API_TOKEN }}
          coverage-reports: backend/coverage.xml,frontend/coverage/**/lcov.info
