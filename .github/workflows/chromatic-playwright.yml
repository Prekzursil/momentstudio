name: Chromatic Playwright

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/chromatic-playwright.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/chromatic-playwright.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: chromatic-playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Chromatic Playwright
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      CHROMATIC_ARCHIVE_LOCATION: test-results/chromatic-archives
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Upgrade npm
        run: npm i -g npm@11.7.0

      - name: Decide Chromatic execution
        id: chromatic
        run: |
          if [ -n "${{ secrets.CHROMATIC_PROJECT_TOKEN }}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.user.login }}" = "dependabot[bot]" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Chromatic because CHROMATIC_PROJECT_TOKEN is unavailable on this Dependabot pull request."
            exit 0
          fi

          echo "CHROMATIC_PROJECT_TOKEN is not configured for this repository."
          exit 1

      - name: Install dependencies
        if: steps.chromatic.outputs.run == 'true'
        run: npm ci

      - name: Install Playwright browser
        if: steps.chromatic.outputs.run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Generate Playwright archives
        if: steps.chromatic.outputs.run == 'true'
        run: npm run e2e:chromatic

      - name: Upload to Chromatic
        if: steps.chromatic.outputs.run == 'true'
        run: npx chromatic --playwright --project-token=${{ secrets.CHROMATIC_PROJECT_TOKEN }}

      - name: Note skipped Chromatic run
        if: steps.chromatic.outputs.run != 'true'
        run: echo "Chromatic upload was skipped for this Dependabot PR because the project token is unavailable in Dependabot secrets."
