name: Sentry Release

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  sentry-pr-verify:
    name: sentry-pr-verify
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
      SENTRY_URL: ${{ vars.SENTRY_URL }}
    steps:
      - name: Validate Sentry configuration
        run: |
          set -euo pipefail
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            echo "::error::Missing SENTRY_AUTH_TOKEN secret."
            exit 1
          fi
          if [ -z "${SENTRY_ORG:-}" ]; then
            echo "::error::Missing SENTRY_ORG variable."
            exit 1
          fi
          if [ -z "${SENTRY_PROJECT:-}" ]; then
            echo "::warning::Missing SENTRY_PROJECT variable; project slug will be auto-resolved."
          fi

      - name: Verify Sentry API access and project binding
        run: |
          set -euo pipefail
          if [ -n "${SENTRY_URL:-}" ]; then
            export SENTRY_URL
          else
            unset SENTRY_URL || true
          fi

          SENTRY_CLI="npx --yes @sentry/cli@2.57.0"
          ${SENTRY_CLI} info

          project_slug="${SENTRY_PROJECT:-}"

          validate_project_slug() {
            local candidate="${1:-}"
            [ -n "$candidate" ] || return 1
            ${SENTRY_CLI} releases list --org "${SENTRY_ORG}" --project "$candidate" --quiet >/dev/null 2>&1
          }

          if validate_project_slug "$project_slug"; then
            echo "Using configured Sentry project: $project_slug"
          else
            if [ -n "$project_slug" ]; then
              echo "::warning::Configured SENTRY_PROJECT '$project_slug' is not accessible; resolving project slug from Sentry APIs."
            fi

            sentry_api_base="${SENTRY_URL:-https://sentry.io}"
            api_candidate="$(
              curl -fsSL \
                -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
                -H "Content-Type: application/json" \
                "${sentry_api_base%/}/api/0/organizations/${SENTRY_ORG}/projects/" 2>/dev/null \
              | python - <<'PY'
          import json
          import sys
          
          def emit_first_slug(items):
              if isinstance(items, list):
                  for item in items:
                      if isinstance(item, dict):
                          slug = item.get("slug")
                          if slug:
                              print(slug)
                              return
              print("")
          
          raw = sys.stdin.read().strip()
          if not raw:
              print("")
              raise SystemExit
          
          try:
              payload = json.loads(raw)
          except Exception:
              print("")
              raise SystemExit
          
          if isinstance(payload, list):
              emit_first_slug(payload)
          elif isinstance(payload, dict):
              for key in ("results", "projects", "data"):
                  candidate = payload.get(key)
                  if isinstance(candidate, list):
                      emit_first_slug(candidate)
                      break
              else:
                  print("")
          else:
              print("")
          PY
            )"

            if validate_project_slug "$api_candidate"; then
              project_slug="$api_candidate"
            else
              cli_candidate="$(
                ${SENTRY_CLI} projects list --org "${SENTRY_ORG}" 2>/dev/null \
                | awk 'NF { print $1 }' \
                | sed -E 's|.*/||' \
                | head -n 1
              )"
              if validate_project_slug "$cli_candidate"; then
                project_slug="$cli_candidate"
              else
                project_slug=""
              fi
            fi
          fi

          if [ -z "$project_slug" ]; then
            echo "::error::Unable to resolve an accessible Sentry project slug for org '${SENTRY_ORG}'."
            exit 1
          fi

          echo "Resolved Sentry project: $project_slug"
          ${SENTRY_CLI} releases list --org "${SENTRY_ORG}" --project "$project_slug" --quiet

  release-and-sourcemaps:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check Sentry configuration
        id: config
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_URL: ${{ vars.SENTRY_URL }}
        run: |
          set -euo pipefail
          missing=()
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            missing+=("SENTRY_AUTH_TOKEN secret")
          fi
          if [ -z "${SENTRY_ORG:-}" ]; then
            missing+=("SENTRY_ORG variable")
          fi
          if [ -z "${SENTRY_PROJECT:-}" ]; then
            missing+=("SENTRY_PROJECT variable")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Sentry Release"
              echo ""
              echo "Skipped: missing configuration."
              for item in "${missing[@]}"; do
                echo "- ${item}"
              done
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "release=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          if [ -n "${SENTRY_URL:-}" ]; then
            echo "url=${SENTRY_URL}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.config.outputs.enabled == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node
        if: steps.config.outputs.enabled == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Upgrade npm
        if: steps.config.outputs.enabled == 'true'
        run: npm i -g npm@11.7.0

      - name: Build frontend with source maps
        if: steps.config.outputs.enabled == 'true'
        run: |
          cd frontend
          npm ci
          npm run build -- --configuration production --source-map=true

      - name: Publish Sentry release and sourcemaps
        if: steps.config.outputs.enabled == 'true'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_URL_INPUT: ${{ steps.config.outputs.url }}
          RELEASE: ${{ steps.config.outputs.release }}
        run: |
          set -euo pipefail
          if [ -n "${SENTRY_URL_INPUT:-}" ]; then
            export SENTRY_URL="${SENTRY_URL_INPUT}"
          else
            unset SENTRY_URL || true
          fi
          SENTRY_CLI="npx --yes @sentry/cli@2.57.0"
          ${SENTRY_CLI} releases new "$RELEASE"
          ${SENTRY_CLI} releases set-commits "$RELEASE" --auto
          ${SENTRY_CLI} sourcemaps inject frontend/dist/app/browser
          ${SENTRY_CLI} sourcemaps upload --release "$RELEASE" frontend/dist/app/browser
          ${SENTRY_CLI} releases finalize "$RELEASE"
          {
            echo "## Sentry Release"
            echo ""
            echo "Published release \`$RELEASE\` and uploaded frontend sourcemaps from \`frontend/dist/app/browser\`."
          } >> "$GITHUB_STEP_SUMMARY"

