name: Quality Zero Platform

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  shared-scanner-matrix:
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-scanner-matrix.yml@37a6db2c75dc6891eea39007c96e8f9cbde22579 # main
    with:
      repo_slug: ${{ github.repository }}
      event_name: ${{ github.event_name }}
      sha: ${{ github.event.pull_request.head.sha || github.sha }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      DEEPSCAN_API_TOKEN: ${{ secrets.DEEPSCAN_API_TOKEN }}
