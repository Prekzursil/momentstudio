name: Applitools Visual

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "30 6 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  applitools-core:
    name: Applitools Visual
    runs-on: ubuntu-latest
    environment: visual-ci
    env:
      APPLITOOLS_PR_ORIGIN: ${{ (github.actor == 'dependabot[bot]') || (github.event.pull_request.user.login == 'dependabot[bot]') }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Upgrade npm
        run: npm i -g npm@11.7.0

      - name: Detect Applitools availability
        id: applitools
        env:
          APPLITOOLS_API_KEY: ${{ secrets.APPLITOOLS_API_KEY }}
          APPLITOOLS_SERVER_URL: ${{ vars.APPLITOOLS_SERVER_URL }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
          PULL_REQUEST_AUTHOR: ${{ github.event.pull_request.user.login || '' }}
          PULL_REQUEST_HEAD_REF: ${{ github.event.pull_request.head.ref || github.head_ref || '' }}
        run: python scripts/quality/check_applitools_availability.py

      - name: Install frontend dependencies
        if: steps.applitools.outputs.available == 'true'
        run: |
          cd frontend
          npm ci
          npx playwright install --with-deps chromium

      - name: Build and start compose stack
        if: steps.applitools.outputs.available == 'true'
        env:
          LOCKERS_USE_OVERPASS_FALLBACK: "0"
          PAYMENTS_PROVIDER: "mock"
        run: docker compose -f infra/docker-compose.yml up -d --build

      - name: Wait for frontend/backend
        if: steps.applitools.outputs.available == 'true'
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8001/api/v1/health/ready >/dev/null; then
              break
            fi
            sleep 2
          done
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:4201 >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://localhost:4201 >/dev/null

      - name: Applitools Eyes snapshot run
        if: steps.applitools.outputs.available == 'true'
        env:
          APPLITOOLS_API_KEY: ${{ secrets.APPLITOOLS_API_KEY }}
          APPLITOOLS_BATCH_NAME: GitHub-${{ github.workflow }}-${{ github.ref_name }}
          APPLITOOLS_SERVER_URL: ${{ vars.APPLITOOLS_SERVER_URL }}
          E2E_BASE_URL: http://localhost:4201
        run: |
          set -euo pipefail
          cd frontend
          timeout 20m npm run e2e -- --project=chromium e2e/applitools-core-routes.spec.ts

      - name: Note skipped Applitools run
        if: steps.applitools.outputs.available != 'true'
        run: echo "Applitools visual validation was skipped because the credential/server preflight is not usable in this Dependabot context."

      - name: Logs (on failure)
        if: failure() && steps.applitools.outputs.available == 'true'
        run: docker compose -f infra/docker-compose.yml logs --no-color --tail=200

      - name: Tear down
        if: always() && steps.applitools.outputs.available == 'true'
        run: docker compose -f infra/docker-compose.yml down -v
