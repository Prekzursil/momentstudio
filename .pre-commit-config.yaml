repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.3.3
    hooks:
      - id: prettier
        files: ^frontend/

  # --- Gate 5 (lean charter): secrets (gitleaks 8.30.1, pinned) ---
  # Additive: the lean reusable-quality.yml runs the secrets gate via this
  # pre-commit hook (gate-lint-format-secrets). Allowlist + reasons in .gitleaks.toml.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: gitleaks (secrets)
        args: ["--config", ".gitleaks.toml"]

  - repo: local
    hooks:
      - id: frontend-eslint
        name: frontend lint (eslint)
        entry: npm --prefix frontend run lint
        language: system
        pass_filenames: false
        files: ^frontend/

      - id: frontend-i18n
        name: frontend i18n key check
        entry: npm --prefix frontend run i18n:check
        language: system
        pass_filenames: false
        files: ^frontend/
