# Momentstudio Workflow Code Cleanup And Formatting

## Action

Follow the code-cleanup-and-formatting workflow:
1. Identify dead code and unused imports via static analysis tools (e.g., CodeQL, Ruff).
2. Remove or refactor the identified code in relevant files.
3. Run code formatting tools (e.g., Autopep8, Black, Ruff Formatter) on the affected files.
4. Verify that linters and formatters report no further issues.
5. Optionally, document or comment on any non-obvious changes.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: backend/app/api/v1/analytics.py, backend/app/api/v1/coupons_v2.py, backend/app/services/catalog.py

