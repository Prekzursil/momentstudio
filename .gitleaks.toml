# gitleaks configuration for the lean secrets gate (pinned tool: gitleaks 8.30.1).
# The gate runs via pre-commit over the working tree and must report 0 findings.
# Extends the upstream default ruleset; we only add path/match allowlists for
# vendored dependencies, build output, and genuine greppable test/example
# fixtures (no real secrets).
title = "momentstudio lean secrets gate"

[extend]
useDefault = true

[allowlist]
description = "Vendored deps, generated/build output, and reasoned non-secret fixtures."

# Never scan third-party / generated / local-tooling trees. These are not our
# source and produce only upstream-example false positives.
paths = [
  '''(^|/)\.venv/''',
  '''(^|/)node_modules/''',
  '''(^|/)vendor/''',
  '''(^|/)dist/''',
  '''(^|/)build/''',
  '''(^|/)out/''',
  '''(^|/)\.git/''',
  '''(^|/)\.angular/''',
  '''.*\.egg-info/''',
  # Local/example env templates carry placeholder values, not real secrets.
  '''(^|/)\.env\.example$''',
  '''(^|/)\.env\.sample$''',
  '''(^|/)\.env\.template$''',
  # Generated scanner-baseline exports (Sonar/Codacy issue dumps + GitHub
  # code-scanning/dependabot snapshots). These are machine-generated audit
  # artifacts; their Sonar issue keys / hashes (e.g. "AZyQF...") trip the
  # generic-api-key heuristic. They are data, not source, and hold no secrets.
  '''(^|/)docs/reports/scanner-baselines/''',
]

# Reasoned content allowlists for non-secret matches (env-var references and
# placeholder/test fixtures, including ones that only exist in older history).
# These are NOT hardcoded credentials.
regexes = [
  # curl auth uses the $SONAR_TOKEN env var, never a literal credential.
  '''\$\{?SONAR_TOKEN\}?:''',
  # Explicit Stripe sandbox placeholder used as a config default, not a key.
  '''sk_test_placeholder''',
  # Truncated fake PEM header used as a unit-test fixture (history only).
  '''-----BEGIN PRIVATE KEY-----\\nX''',
]
