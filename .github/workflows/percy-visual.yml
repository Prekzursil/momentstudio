name: Percy Visual

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  percy-core-pr:
    name: percy-core-pr
    runs-on: ubuntu-latest
    env:
      PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
      PERCY_PR_ENABLED: ${{ vars.PERCY_PR_ENABLED || '0' }}
      PERCY_AUTO_APPROVE_PR: ${{ vars.PERCY_AUTO_APPROVE_PR || '1' }}
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      PULL_REQUEST_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Validate Percy PR configuration
        run: |
          set -euo pipefail
          if [ "${PERCY_PR_ENABLED}" != "1" ]; then
            echo "::error::PERCY_PR_ENABLED must be '1' for PR checks."
            exit 1
          fi
          if [ -z "${PERCY_TOKEN:-}" ]; then
            echo "::error::Missing PERCY_TOKEN secret."
            exit 1
          fi

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
          npx playwright install --with-deps chromium

      - name: Build and start compose stack
        env:
          LOCKERS_USE_OVERPASS_FALLBACK: "0"
          PAYMENTS_PROVIDER: "mock"
        run: docker compose -f infra/docker-compose.yml up -d --build

      - name: Wait for frontend/backend
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8001/api/v1/health/ready >/dev/null; then
              break
            fi
            sleep 2
          done
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:4201 >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://localhost:4201 >/dev/null

      - name: Percy core snapshot run
        env:
          E2E_BASE_URL: http://localhost:4201
        run: |
          set -euo pipefail
          cd frontend
          npx percy exec -- npm run e2e -- e2e/percy-core-routes.spec.ts --project=chromium --workers=1

      - name: Auto-approve Percy PR build (optional helper)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          set +e
          if [[ "${PERCY_AUTO_APPROVE_PR:-1}" != "1" ]]; then
            exit 0
          fi
          python3 scripts/audit/percy_auto_approve.py --sha "${PULL_REQUEST_HEAD_SHA}" --branch "${GITHUB_HEAD_REF:-}"

      - name: Logs (on failure)
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs --no-color --tail=200

      - name: Tear down
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v
