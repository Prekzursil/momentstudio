# Momentstudio Workflow Add 100 Percent Behavioral Test Coverage For Service

## Action

Follow the add-100-percent-behavioral-test-coverage-for-service workflow:
1. Write or update the service's .spec.ts file with behavioral tests covering all public methods and code branches.
2. Assert correct HTTP verb, URL, params, and observable emissions for each method.
3. Annotate any unreachable SSR or defensive code with 'istanbul ignore next' if needed.
4. Run coverage tools to verify 100% line/branch/function/statement coverage for the service.
5. Commit the .spec.ts file (and .ts if annotations are added).

