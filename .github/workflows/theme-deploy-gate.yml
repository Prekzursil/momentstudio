name: theme-deploy-gate

# P1a theme deploy gate — FAIL-LOUD sub-gates run before the theme foundation
# ships (see scripts/deploy/README.md):
#   1. migration consistency (0159 single head, applies clean, models match — no
#      autogenerate diff),
#   2. migration reversibility (0159 upgrade->downgrade->upgrade round-trip clean),
#   3. security lane (WU13 adversarial theme suite actually runs),
#   4. themed-render smoke (default theme renders a complete, injection-safe
#      <style> injected into <head> + a matching report-only CSP hash),
#   5. post-deploy smoke (real HTTP GET /theme + home.sections both 200),
#   6. cache posture (no themeable route served from a full-page cache carrying a
#      baked theme blob — R3-B1).
#
# Runs ALONGSIDE the required `quality / quality` check as its own required
# status context; it does NOT touch the shared reusable workflow on the
# quality-zero-platform repo. `workflow_call` lets deploy-production-manual.yml
# require it as a pre-deploy dependency.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: theme-deploy-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  theme-deploy-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-ci.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-ci.txt

      # --- Sub-gate 1: migration consistency (model/migration drift guard) ----
      - name: Sub-gate 1 - theme migration consistency
        run: python scripts/deploy/theme_migration_consistency.py

      # --- Sub-gate 2: migration reversibility (rollback safety) --------------
      - name: Sub-gate 2 - theme migration reversibility
        run: python scripts/deploy/theme_migration_reversibility.py

      # --- Sub-gate 3: WU13 adversarial security lane -------------------------
      - name: Sub-gate 3 - theme security lane
        run: bash scripts/quality/theme_security_lane.sh

      # --- Sub-gate 4: themed-render smoke + report-only CSP ------------------
      - name: Sub-gate 4 - themed-render smoke
        run: python scripts/deploy/theme_render_smoke.py

      # --- Sub-gate 5: post-deploy HTTP smoke (GET /theme + home.sections) ----
      - name: Sub-gate 5 - theme post-deploy smoke
        run: python scripts/deploy/theme_post_deploy_smoke.py

      # --- Sub-gate 6: cache posture (R3-B1, no baked theme in full-page cache)
      - name: Sub-gate 6 - theme cache posture
        run: python scripts/deploy/theme_cache_posture.py

      # --- Gate self-tests: STRICT 100% line+branch on the gate modules -------
      - name: Deploy-gate self-tests (100% coverage)
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          coverage run --rcfile=scripts/deploy/.coveragerc -m pytest scripts/deploy/tests -q
          coverage report --rcfile=scripts/deploy/.coveragerc --fail-under=100
