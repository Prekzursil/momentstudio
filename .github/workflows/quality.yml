# Lean 6-gate quality (ADDITIVE caller — lean-gate charter, decided 2026-06-16).
#
# Thin ~5-line caller of the shared reusable workflow on the quality-zero-platform
# template branch. The reusable workflow auto-detects the languages present in
# this monorepo (Python backend + Angular/TypeScript frontend) and runs ONLY the
# lanes whose language/config is present:
#   1. lint+format+imports+sec-lint (pre-commit autofixers + gitleaks secrets)
#   2. types (tsc --noEmit / basedpyright)
#   3. tests+coverage (STRICT 100% line+branch)
#   4. SAST (opengrep, pinned in-repo ruleset .quality/opengrep)
#   5. secrets (gitleaks, .gitleaks.toml)
#   6. deps (osv-scanner, osv-scanner.toml + Dependabot)
#
# This is ADDITIVE: it does NOT replace the repo's existing SaaS workflows, and
# it does NOT touch branch protection / required status contexts (deferred to
# the migration runbook). The @feat/lean-quality-template ref makes this PR's CI
# real now; the runbook re-pins to a tag after the template merges.
name: quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-quality.yml@v1
    with:
      opengrep-paths: "backend frontend"
