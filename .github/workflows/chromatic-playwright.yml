name: Chromatic Playwright

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/chromatic-playwright.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/chromatic-playwright.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: chromatic-playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Visual regression (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      CHROMATIC_ARCHIVE_LOCATION: test-results/chromatic-archives
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Upgrade npm
        run: npm i -g npm@11.7.0

      - name: Validate Chromatic token
        run: |
          if [ -z "${{ secrets.CHROMATIC_PROJECT_TOKEN }}" ]; then
            echo "CHROMATIC_PROJECT_TOKEN is not configured for this repository."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Generate Playwright archives
        run: npm run e2e:chromatic

      - name: Upload to Chromatic
        run: npx chromatic --playwright --project-token=${{ secrets.CHROMATIC_PROJECT_TOKEN }}
