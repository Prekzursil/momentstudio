[pytest]
# The lean quality gate runs `pytest` from the repo root (no PYTHONPATH export),
# so the backend source dir must be on sys.path for `from app...` imports to
# resolve. pytest's native pythonpath option (relative to rootdir) handles this
# without changing the repo's own backend.yml workflow.
pythonpath = backend
filterwarnings =
    ignore:Please use `import python_multipart` instead\.:PendingDeprecationWarning
    # Known teardown race in aiosqlite cancellation path under pytest event-loop shutdown.
    ignore:coroutine 'Connection._cancel' was never awaited:RuntimeWarning
