name: Quality Zero Backlog

permissions: {}

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  backlog-sweep:
    permissions:
      contents: write
      pull-requests: write
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-backlog-sweep.yml@f5bbd3fe1704c69582b9be4b5e1ba3b6c5aef479
    with:
      repo_slug: ${{ github.repository }}
      lane: quality
    secrets:
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
