name: Sentry Release

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  sentry-pr-verify:
    name: sentry-pr-verify
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
      SENTRY_URL: ${{ vars.SENTRY_URL }}
    steps:
      - name: Validate Sentry configuration
        run: |
          set -euo pipefail
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            echo "::error::Missing SENTRY_AUTH_TOKEN secret."
            exit 1
          fi
          if [ -z "${SENTRY_ORG:-}" ]; then
            echo "::error::Missing SENTRY_ORG variable."
            exit 1
          fi
          if [ -z "${SENTRY_PROJECT:-}" ]; then
            echo "::warning::SENTRY_PROJECT variable is not set; resolving a project slug from Sentry API."
          fi

      - name: Verify Sentry API access and project binding
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -n "${SENTRY_URL:-}" ]; then
            export SENTRY_URL
          else
            unset SENTRY_URL || true
          fi

          SENTRY_CLI="npx --yes @sentry/cli@2.57.0"
          ${SENTRY_CLI} info

          requested_project="${SENTRY_PROJECT:-}"
          resolved_project=""

          if [ -n "$requested_project" ]; then
            if ${SENTRY_CLI} releases list --org "${SENTRY_ORG}" --project "$requested_project" --quiet >/dev/null 2>&1; then
              resolved_project="$requested_project"
            else
              echo "::warning::Configured SENTRY_PROJECT '$requested_project' is not accessible; discovering valid project for org '$SENTRY_ORG'."
            fi
          fi

          if [ -z "$resolved_project" ]; then
            resolved_project="$(python - <<'PY'
import json
import os
import urllib.request

org = os.environ.get('SENTRY_ORG', '').strip()
repo = os.environ.get('GITHUB_REPOSITORY', '').strip().split('/')[-1].lower()
token = os.environ.get('SENTRY_AUTH_TOKEN', '').strip()
base = os.environ.get('SENTRY_URL', 'https://sentry.io').rstrip('/')

req = urllib.request.Request(
    f"{base}/api/0/organizations/{org}/projects/",
    headers={"Authorization": f"Bearer {token}"},
)
with urllib.request.urlopen(req, timeout=30) as resp:
    projects = json.load(resp)

slugs = [p.get('slug', '').strip() for p in projects if p.get('slug')]
if not slugs:
    print("")
    raise SystemExit(0)

preferred = [repo, 'momentstudio', 'adrianaart']
for cand in preferred:
    if cand in slugs:
        print(cand)
        raise SystemExit(0)

print(slugs[0])
PY
)"
          fi

          if [ -z "$resolved_project" ]; then
            echo "::error::No accessible Sentry project could be resolved for organization '$SENTRY_ORG'."
            exit 1
          fi

          echo "Resolved Sentry project: $resolved_project"
          ${SENTRY_CLI} releases list --org "${SENTRY_ORG}" --project "$resolved_project" --quiet

  release-and-sourcemaps:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check Sentry configuration
        id: config
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_URL: ${{ vars.SENTRY_URL }}
        run: |
          set -euo pipefail
          missing=()
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            missing+=("SENTRY_AUTH_TOKEN secret")
          fi
          if [ -z "${SENTRY_ORG:-}" ]; then
            missing+=("SENTRY_ORG variable")
          fi
          if [ -z "${SENTRY_PROJECT:-}" ]; then
            missing+=("SENTRY_PROJECT variable")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Sentry Release"
              echo ""
              echo "Skipped: missing configuration."
              for item in "${missing[@]}"; do
                echo "- ${item}"
              done
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "release=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          if [ -n "${SENTRY_URL:-}" ]; then
            echo "url=${SENTRY_URL}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.config.outputs.enabled == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node
        if: steps.config.outputs.enabled == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Upgrade npm
        if: steps.config.outputs.enabled == 'true'
        run: npm i -g npm@11.7.0

      - name: Build frontend with source maps
        if: steps.config.outputs.enabled == 'true'
        run: |
          cd frontend
          npm ci
          npm run build -- --configuration production --source-map=true

      - name: Publish Sentry release and sourcemaps
        if: steps.config.outputs.enabled == 'true'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_URL_INPUT: ${{ steps.config.outputs.url }}
          RELEASE: ${{ steps.config.outputs.release }}
        run: |
          set -euo pipefail
          if [ -n "${SENTRY_URL_INPUT:-}" ]; then
            export SENTRY_URL="${SENTRY_URL_INPUT}"
          else
            unset SENTRY_URL || true
          fi
          SENTRY_CLI="npx --yes @sentry/cli@2.57.0"
          ${SENTRY_CLI} releases new "$RELEASE"
          ${SENTRY_CLI} releases set-commits "$RELEASE" --auto
          ${SENTRY_CLI} sourcemaps inject frontend/dist/app/browser
          ${SENTRY_CLI} sourcemaps upload --release "$RELEASE" frontend/dist/app/browser
          ${SENTRY_CLI} releases finalize "$RELEASE"
          {
            echo "## Sentry Release"
            echo ""
            echo "Published release \`$RELEASE\` and uploaded frontend sourcemaps from \`frontend/dist/app/browser\`."
          } >> "$GITHUB_STEP_SUMMARY"
